name: Linting

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ${{ matrix.image }}
    strategy:
      matrix:
        os:
          - Ubuntu
        python-version:
          - "3.14"
        include:
          - os: Ubuntu
            image: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      # For building pillow from source
      # - name: Install libjpeg headers
      #   run: sudo apt-get install libjpeg-dev
      #   if: matrix.python-version == '3.14'

      # For building pyodbc from source
      # - name: Install unixodbc headers
      #   run: sudo apt-get install unixodbc-dev
      #   if: matrix.python-version == '3.14'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Check lockfile
        run: uv lock --locked --offline

      - name: Install project
        env:
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: uv sync -p "$PYTHON_VERSION" --extra azure

      - name: Install ruff
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0

      - name: ruff check
        run: ruff check .

      - name: ruff format
        run: ruff format --check .

      - name: mypy
        run: uv run mypy .

      - name: pytest
        run: uv run pytest
